<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A live-updating FIFA World Cup 2026 command center with streams, fixtures, standings, and knockout bracket."
    />
    <title>World Cup 2026 Live Center</title>
    <script>
      (() => {
        const stored = localStorage.getItem("wc26-theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = stored || (prefersDark ? "dark" : "light");
      })();
    </script>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='28' fill='%23137a4b'/%3E%3Ccircle cx='32' cy='32' r='12' fill='white'/%3E%3Cpath d='M32 4v16M32 44v16M4 32h16M44 32h16' stroke='%23c9962d' stroke-width='6'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://worldcup26.ir" />
    <link rel="preconnect" href="https://streamed.pk" />
    <link rel="preconnect" href="https://flagcdn.com" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <nav class="topbar" aria-label="Primary">
          <a class="brand" href="#top" aria-label="World Cup live center home">
            <span class="brand-mark"></span>
            <span>
              <strong>WC26</strong>
              <small>Live Center</small>
            </span>
          </a>
          <div class="nav-actions">
            <button class="icon-btn theme-btn" type="button" data-theme-toggle title="Toggle dark mode" aria-label="Toggle dark mode">
              <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4" />
                <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
              </svg>
              <svg class="moon-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 14.7A8.5 8.5 0 0 1 9.3 4 7 7 0 1 0 20 14.7Z" />
              </svg>
            </button>
            <button class="icon-btn" type="button" data-refresh title="Refresh data" aria-label="Refresh data">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12a9 9 0 0 1-15.4 6.3M3 12A9 9 0 0 1 18.4 5.7" />
                <path d="M21 5v7h-7M3 19v-7h7" />
              </svg>
            </button>
          </div>
        </nav>

        <section class="hero-grid" id="top">
          <div class="hero-copy">
            <p class="eyebrow">FIFA World Cup 2026</p>
            <h1>World Cup command center.</h1>
            <p>
              Fixtures, live streams, group math, and the knockout road in one fast matchday interface.
            </p>
            <div class="hero-actions">
              <a class="primary-action" href="#live">Watch live</a>
              <a class="secondary-action" href="#knockout">View bracket</a>
            </div>
          </div>
          <aside class="hero-card" aria-label="Tournament status">
            <div class="status-line">
              <span class="live-dot"></span>
              <span data-status-text>Loading tournament data</span>
            </div>
            <div class="trophy-stage" aria-hidden="true">
              <img src="./assets/world-cup-trophy.png" alt="" loading="eager" />
              <span class="scan-line"></span>
            </div>
            <div class="hero-metrics">
              <div>
                <strong data-stat-matches>--</strong>
                <span>matches</span>
              </div>
              <div>
                <strong data-stat-live>--</strong>
                <span>live now</span>
              </div>
              <div>
                <strong data-stat-groups>--</strong>
                <span>groups</span>
              </div>
            </div>
          </aside>
        </section>

        <div class="team-ribbon" aria-label="Qualified teams" data-team-ribbon></div>
      </header>

      <main>
        <section class="control-strip" aria-label="Tournament controls">
          <div class="tab-list" role="tablist" aria-label="Views">
